[model]
id = "gemma-3-27b-it-abliterated-exl2"

[gen]
frequency_penalty = 0.0
max_new_tokens = 2048
presence_penalty = 0.0
repetition_penalty = 1.025
stream = true
temperature = 0.7
top_k = 64
top_p = 0.9

[prompt]
chat_template = "models/gemma-3-27b-it-abliterated-exl2/exl2/templates/gemma_chat_sanitized.jinja"
prompt_mode = "chat"
system = ""
system_file = "models/gemma-3-27b-it-abliterated-exl2/exl2/prompts/system.txt"
user_prefix = ""

[ui]
assume_think = true
no_animate_thinking = false
save_transcript = ""
capture_last_request = false
scroll_lines = 9
show_thinking = true
ui_max_events_per_tick = 33
ui_tick_ms = 33

[backend.exl2]
cache_type = "fp16"
exl2_repeat_streak_max = 64
exl2_repo_path = ""
exl2_stop_tokens = ["<end_of_turn>", "<start_of_turn>"]
gpu_split = ""
log_file = ""
low_mem = false
max_seq_len = 10240
min_free_tokens = 256
model_path = "~/ml/models"
