[model]
id = "gemma-3-27b-it-abliterated-exl2"

[gen]
frequency_penalty = 0.0
max_new_tokens = 8192
presence_penalty = 0.0
repetition_penalty = 1.025
stream = true
temperature = 0.6
top_k = 64
top_p = 0.9

[prompt]
chat_template = "models/gemma-3-27b-it-abliterated-exl2/exl2/templates/gemma_chat_sanitized.jinja"
prompt_mode = "chat"
system = ""
system_file = ""
user_prefix = ""

[ui]
assume_think = true
history_strip_think = false
no_animate_thinking = false
save_transcript = ""
capture_last_request = false
scroll_lines = 9
show_thinking = true
show_tool_activity = false
show_tool_arguments = false
ui_max_events_per_tick = 33
ui_tick_ms = 33

[telemetry]
jsonl = ""
sample_interval_s = 1.0

[tools]
enabled = false
mode = "dry_run"
schema_file = ""
allow = []
deny = []
max_calls_per_turn = 3
timeout_s = 10
max_result_chars = 8000

[backend.exl2]
cache_type = "fp16"
exl2_repeat_streak_max = 64
exl2_repo_path = ""
exl2_stop_tokens = ["<end_of_turn>", "<start_of_turn>"]
gpu_split = ""
log_file = ""
low_mem = false
max_seq_len = 32768
min_free_tokens = 256
model_path = ""
flash_attn = true
